services:
  db:
    image: postgres:16-alpine
    container_name: erp-db
    restart: always
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_senha_segura
      POSTGRES_DB: erp_espaco_mulher
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: America/Sao_Paulo
      LANG: pt_BR.UTF-8
      LC_ALL: pt_BR.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_espaco_mulher"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: erp-app
    restart: always
    init: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://erp:erp_senha_segura@db:5432/erp_espaco_mulher?schema=public&connection_limit=5"
      JWT_SECRET: "${JWT_SECRET:-altere-em-producao-chave-secreta-jwt}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@erp.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin@123456}"
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: 3000
      NODE_OPTIONS: "--max-old-space-size=2048"
    ports:
      - "3001:3000"
    networks:
      - default
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
    name: erp_postgres_data

# Rede padrão (não precisa definir nada, o Docker cria automaticamente)